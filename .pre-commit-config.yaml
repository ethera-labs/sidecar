repos:
  - repo: local
    hooks:
      - id: fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --all
        args: []
        types: [rust]
        pass_filenames: false

      - id: clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --workspace --all-targets --
        args: [-D, warnings]
        types: [rust]
        pass_filenames: false

      - id: deny
        name: cargo deny
        language: system
        entry: cargo deny check
        pass_filenames: false
        files: ^(Cargo\.(toml|lock)|crates/.+\.toml)$

      - id: machete
        name: cargo machete
        language: system
        entry: cargo machete crates/
        pass_filenames: false
        files: ^crates/.+\.toml$
