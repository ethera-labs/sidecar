[advisories]
yanked = "warn"
ignore = ["RUSTSEC-2024-0436"]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = [{ name = "openssl" }]
skip = []
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "Unlicense",
    "Unicode-3.0",
    "Zlib",
    "LicenseRef-rustls-webpki",
    "CDLA-Permissive-2.0",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "rustls-webpki"
expression = "LicenseRef-rustls-webpki"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[sources]
unknown-registry = "warn"
unknown-git = "deny"
